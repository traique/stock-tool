name: Update Stocks

on:
  schedule:
    # 09:00–11:45 GMT+7  => 02:00–04:45 UTC
    - cron: "0,15,30,45 2,3 * * 1-5"
    - cron: "0,15,30 4 * * 1-5"

    # 13:00–15:00 GMT+7 => 06:00–08:00 UTC
    - cron: "0,15,30,45 6,7 * * 1-5"
    - cron: "0 8 * * 1-5"

  workflow_dispatch:

jobs:
  update-stocks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - env:
          DB_URL: ${{ secrets.DB_URL }}
        run: python update.py
